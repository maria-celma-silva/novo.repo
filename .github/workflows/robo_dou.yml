name: Robô Diário Oficial (ETL)

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  executar_etl:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4 

      - name: Configurar o Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.13'

      - name: Instalar as Bibliotecas
        run: pip install pandas selenium webdriver-manager

      - name: Rodar o Pipeline ETL
        run: python main.py

      - name: Salvar as atualizações no GitHub
        run: |
          git config --global user.name 'Robô de Monitoramento DOU'
          git config --global user.email 'seu_email@exemplo.com'
          git add .
          git commit -m "Atualização automática: Novos registros do DOU" || echo "Nenhuma mudança para salvar hoje"
          git push || echo "Nada novo para enviar"